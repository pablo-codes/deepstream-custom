  # ──────────────────────────────────────────────────────────────
  # SERVER 2: Build and Push Apptainer SIF (Runs on a FRESH disk)
  # ──────────────────────────────────────────────────────────────
  build-sif:
    runs-on: ubuntu-latest
    # needs: build-docker # This forces Server 2 to wait until Server 1 completely finishes
    permissions:
      packages: write

    steps:
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.1

      - name: Build SIF from remote GHCR image
        run: |
          echo "Building SIF on a clean disk from the newly pushed Docker image..."
          # Server 2 has 100% of its disk free, easily accommodating the layer extraction
          apptainer build deepstream_custom.sif docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Push SIF to GHCR (ORAS)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | apptainer registry login -u ${{ github.actor }} --password-stdin oras://${{ env.REGISTRY }}
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          apptainer push deepstream_custom.sif oras://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-sif:latest
          apptainer push deepstream_custom.sif oras://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-sif:$SHORT_SHA
          echo "✅ SIF packed and pushed safely from Server 2."
